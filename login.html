<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login · EduPath</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        /* ========================================
           RESET & BASE - نفس ألوان الموقع
           ======================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #f0f4fc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 24px;
        }

        /* ========================================
           LOGIN CONTAINER
           ======================================== */
        .login-container {
            display: flex;
            max-width: 1000px;
            width: 100%;
            background: #ffffff;
            border-radius: 36px;
            box-shadow: 0 25px 50px -10px rgba(0, 0, 0, 0.12);
            overflow: hidden;
            transition: 0.3s;
        }

        /* ========================================
           LEFT SIDE - IMAGE / BRANDING
           ======================================== */
        .login-left {
            flex: 1;
            background: linear-gradient(135deg, #4a7ec7, #2a5f9e);
            padding: 50px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            position: relative;
            overflow: hidden;
        }

        .login-left::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
        }

        .login-left .brand-icon {
            font-size: 70px;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .login-left h1 {
            font-size: 32px;
            font-weight: 700;
            position: relative;
            z-index: 1;
            margin-bottom: 8px;
        }

        .login-left h1 span {
            font-weight: 300;
        }

        .login-left p {
            font-size: 16px;
            opacity: 0.85;
            position: relative;
            z-index: 1;
            text-align: center;
            line-height: 1.6;
            max-width: 300px;
        }

        .login-left .features {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 280px;
        }

        .login-left .feature-item {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            opacity: 0.9;
        }

        .login-left .feature-item i {
            width: 30px;
            height: 30px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }

        /* ========================================
           RIGHT SIDE - LOGIN FORM
           ======================================== */
        .login-right {
            flex: 1;
            padding: 50px 45px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .login-right .welcome-text {
            margin-bottom: 30px;
        }

        .login-right .welcome-text h2 {
            font-size: 28px;
            font-weight: 700;
            color: #0b1b32;
            margin-bottom: 6px;
        }

        .login-right .welcome-text h2 i {
            color: #4a7ec7;
        }

        .login-right .welcome-text p {
            color: #6b7a93;
            font-size: 15px;
        }

        /* ===== FORM ===== */
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group label {
            font-size: 14px;
            font-weight: 500;
            color: #0b1b32;
        }

        .form-group label i {
            color: #4a7ec7;
            margin-right: 6px;
        }

        .form-group .input-wrapper {
            display: flex;
            align-items: center;
            background: #f1f5f9;
            border-radius: 14px;
            padding: 0 16px;
            border: 2px solid #e4eaf2;
            transition: 0.3s;
        }

        .form-group .input-wrapper:hover {
            border-color: #b0c8e8;
        }

        .form-group .input-wrapper:focus-within {
            border-color: #4a7ec7;
            box-shadow: 0 0 0 4px rgba(74, 126, 199, 0.1);
        }

        .form-group .input-wrapper i {
            color: #9aabbf;
            font-size: 16px;
            transition: 0.3s;
        }

        .form-group .input-wrapper:focus-within i {
            color: #4a7ec7;
        }

        .form-group .input-wrapper input {
            border: none;
            background: transparent;
            padding: 14px 12px;
            font-size: 15px;
            width: 100%;
            outline: none;
            color: #0b1b32;
        }

        .form-group .input-wrapper input::placeholder {
            color: #9aabbf;
        }

        .form-group .input-wrapper .toggle-password {
            cursor: pointer;
            color: #9aabbf;
            transition: 0.3s;
        }

        .form-group .input-wrapper .toggle-password:hover {
            color: #4a7ec7;
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 4px 0 8px 0;
        }

        .form-options .remember {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #5f738e;
            cursor: pointer;
        }

        .form-options .remember input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #4a7ec7;
            cursor: pointer;
        }

        .form-options .forgot-link {
            font-size: 14px;
            color: #4a7ec7;
            text-decoration: none;
            font-weight: 500;
            transition: 0.3s;
        }

        .form-options .forgot-link:hover {
            color: #2a5f9e;
            text-decoration: underline;
        }

        .btn-login {
            padding: 14px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #4a7ec7, #2a5f9e);
            color: #ffffff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(74, 126, 199, 0.35);
        }

        .btn-login:active {
            transform: scale(0.98);
        }

        .btn-login i {
            font-size: 18px;
        }

        /* ===== DIVIDER ===== */
        .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 8px 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e4eaf2;
        }

        .divider span {
            font-size: 13px;
            color: #9aabbf;
            font-weight: 500;
        }

        /* ===== SOCIAL LOGIN ===== */
        .social-login {
            display: flex;
            gap: 12px;
        }

        .social-login button {
            flex: 1;
            padding: 12px;
            border: 2px solid #e4eaf2;
            border-radius: 14px;
            background: #ffffff;
            cursor: pointer;
            transition: 0.3s;
            font-size: 14px;
            font-weight: 500;
            color: #3a4a62;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .social-login button:hover {
            border-color: #4a7ec7;
            background: #f8faff;
            transform: translateY(-2px);
        }

        .social-login button i {
            font-size: 18px;
        }

        .social-login .google i {
            color: #db4437;
        }

        .social-login .apple i {
            color: #000000;
        }

        .social-login .facebook i {
            color: #4267B2;
        }

        /* ===== SIGN UP LINK ===== */
        .signup-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #5f738e;
        }

        .signup-link a {
            color: #4a7ec7;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
        }

        .signup-link a:hover {
            color: #2a5f9e;
            text-decoration: underline;
        }

        /* ========================================
           RESPONSIVE
           ======================================== */
        @media (max-width: 820px) {
            .login-container {
                flex-direction: column;
                max-width: 450px;
            }

            .login-left {
                padding: 40px 30px;
                border-radius: 36px 36px 0 0;
            }

            .login-left h1 {
                font-size: 26px;
            }

            .login-left .features {
                max-width: 100%;
            }

            .login-right {
                padding: 35px 30px;
            }

            .login-right .welcome-text h2 {
                font-size: 24px;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 12px;
            }

            .login-container {
                border-radius: 24px;
            }

            .login-left {
                padding: 30px 20px;
                border-radius: 24px 24px 0 0;
            }

            .login-left .brand-icon {
                font-size: 50px;
            }

            .login-left h1 {
                font-size: 22px;
            }

            .login-left p {
                font-size: 14px;
            }

            .login-right {
                padding: 25px 20px;
            }

            .login-right .welcome-text h2 {
                font-size: 20px;
            }

            .form-group .input-wrapper input {
                padding: 12px 10px;
                font-size: 14px;
            }

            .social-login {
                flex-direction: column;
            }

            .social-login button {
                padding: 10px;
            }

            .form-options {
                flex-direction: column;
                gap: 10px;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>

    <div class="login-container">

        <!-- ===== LEFT SIDE ===== -->
        <div class="login-left">
            <div class="brand-icon">
                <i class="fas fa-graduation-cap"></i>
            </div>
            <h1>Edu<span>Path</span></h1>
            <p>Your gateway to knowledge. Start your learning journey today!</p>

            <div class="features">
                <div class="feature-item">
                    <i class="fas fa-book-open"></i>
                    <span>100+ courses available</span>
                </div>
                <div class="feature-item">
                    <i class="fas fa-users"></i>
                    <span>Join 50,000+ students</span>
                </div>
                <div class="feature-item">
                    <i class="fas fa-certificate"></i>
                    <span>Earn certificates</span>
                </div>
                <div class="feature-item">
                    <i class="fas fa-clock"></i>
                    <span>Learn at your own pace</span>
                </div>
            </div>
        </div>

        <!-- ===== RIGHT SIDE ===== -->
        <div class="login-right">
            <div class="welcome-text">
                <h2><i class="fas fa-user-graduate"></i> Welcome Back!</h2>
                <p>Login to continue your learning journey</p>
            </div>

            <form class="login-form" action="course.html">
                <div class="form-group">
                    <label for="email"><i class="fas fa-envelope"></i> Email Address</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" placeholder="Enter your email" required />
                    </div>
                </div>

                <div class="form-group">
                    <label for="password"><i class="fas fa-lock"></i> Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="Enter your password" required />
                        <i class="fas fa-eye toggle-password" onclick="togglePassword()"></i>
                    </div>
                </div>

                <div class="form-options">
                    <label class="remember">
                        <input type="checkbox" checked />
                        Remember me
                    </label>
                    <a href="#" class="forgot-link">Forgot password?</a>
                </div>

                <button type="submit" class="btn-login">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>

                <div class="divider">
                    <span>or continue with</span>
                </div>

                <div class="social-login">
                    <button type="button" class="google">
                        <i class="fab fa-google"></i> Google
                    </button>
                    <button type="button" class="facebook">
                        <i class="fab fa-facebook"></i>
                    </button>
                    <button type="button" class="apple">
                        <i class="fab fa-apple"></i>
                    </button>
                </div>

                <div class="signup-link">
                    Don't have an account? <a href="#">Sign Up</a>
                </div>
            </form>
        </div>

    </div>

    <script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.querySelector('.toggle-password');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.classList.remove('fa-eye');
                eyeIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                eyeIcon.classList.remove('fa-eye-slash');
                eyeIcon.classList.add('fa-eye');
            }
        }
    </script>

</body>
</html>
